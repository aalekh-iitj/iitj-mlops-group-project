name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 src/ prepare_dataset.py --max-line-length=120 --ignore=E501,W503
