name: Inference

# Triggers ONLY on manual dispatch. Training is intentionally NOT in CI —
# all training happens on Kaggle Notebooks (free GPU). This workflow proves
# the inference image / script can load the model and produce a prediction.

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Text to classify"
        required: true
        default: "I love this assignment!"
      hf_model_name:
        description: "HF model repo to load"
        required: false
        default: "distilbert-base-uncased"

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install inference deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
          HF_MODEL_NAME: ${{ github.event.inputs.hf_model_name }}
        run: |
          python -m src.inference
